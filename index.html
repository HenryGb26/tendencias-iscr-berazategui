        "D20": { type: "Convencional", CT: [null, null, null], CF: [null, null, null], PCE: [null, null, null], TCE: [3.9, 3.2, 4.0], DCE: [0.4, null, null], CFC11: [null, null, null], CFC12: [0.3, null, null], ORP: [-117.1, 20.3, 104.6], pH: [6.43, 6.17, 6.16] },

        "P03a": { type: "Convencional", CT: [null, null, null], CF: [null, null, null], PCE: [null, null, null], TCE: [3.6, 2.8, 3.8], DCE: [1.3, 1.2, 1.5], CFC11: [null, null, 0.2], CFC12: [null, 0.4, 0.3], ORP: [-127.9, -53.0, 151.5], pH: [6.02, 6.01, 5.80] },
        "PZ2": { type: "Convencional", CT: [2.8, 2.2, 8.1], CF: [null, null, null], PCE: [null, null, 0.3], TCE: [1, null, null], DCE: [2.5, 0.5, null], CFC11: [null, null, null], CFC12: [0.3, null, null], ORP: [81.4, 22.5, 111.4], pH: [7.20, 7.10, 7.06] },
        "PZ3": { type: "Convencional", CT: [9.9, 4.6, 33.3], CF: [10.7, null, 13.3], PCE: [null, null, 1.1], TCE: [null, null, 0.3], DCE: [1.1, null, 0.3], CFC11: [null, null, null], CFC12: [null, null, 0.5], ORP: [105.7, 25.5, 196.2], pH: [7.25, 7.13, 6.73] }
      }
    };

    var currentMode = "well";
    var currentWell = "aPIMW04s";
    var currentCompound = "CT";
    var chart = null;

    // Clasificación ORP según PO v3.1 (5 niveles)
    function clasificarORP(orp) {
      if (orp === null) return { clase: "na", label: "S/D", css: "" };
      if (orp < -200) return { clase: "fuert-reductor", label: "Fuert. Red.", css: "fuert-reductor" };
      if (orp >= -200 && orp < -100) return { clase: "reductor", label: "Reductor", css: "reductor" };
      if (orp >= -100 && orp < 0) return { clase: "lev-reductor", label: "Lev. Red.", css: "lev-reductor" };
      if (orp >= 0 && orp < 100) return { clase: "transicion", label: "Transición", css: "transicion" };
      return { clase: "oxidante", label: "Oxidante", css: "oxidante" };
    }

    // Cálculo de tendencia según PO v3.1
    function calcTrend(values) {
      var first = values[0];
      var last = values[values.length - 1];
      
      // Caso: ambos ND
      if (first === null && last === null) {
        return { dir: "na", label: "ND→ND", pct: null };
      }
      
      // Caso: ND → Detectado (aparición)
      if (first === null && last !== null) {
        return { dir: "up", label: "ND→Det", pct: null };
      }
      
      // Caso: Detectado → ND (Det→ND) - CORRECCIÓN PO v3.1
      if (first !== null && last === null) {
        return { dir: "detnd", label: "Det→ND", pct: -100 };
      }
      
      // Caso: ambos detectados
      if (first === 0) return { dir: last > 0 ? "up" : "stable", label: last > 0 ? "↑" : "=", pct: null };
      var pct = ((last - first) / first) * 100;
      if (pct <= -20) return { dir: "down", label: pct.toFixed(0) + "%", pct: pct };
      if (pct >= 20) return { dir: "up", label: "+" + pct.toFixed(0) + "%", pct: pct };
      return { dir: "stable", label: (pct > 0 ? "+" : "") + pct.toFixed(0) + "%", pct: pct };
    }

    function formatVal(v) {
      return v === null ? "ND" : v.toFixed(1);
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById("btn-well").className = mode === "well" ? "btn active" : "btn";
      document.getElementById("btn-compound").className = mode === "compound" ? "btn active" : "btn";
      renderSelector();
      renderChart();
      renderSidePanel();
    }

    function selectWell(id) {
      currentWell = id;
      renderSelector();
      renderChart();
      renderSidePanel();
    }

    function selectCompound(id) {
      currentCompound = id;
      renderSelector();
      renderChart();
      renderSidePanel();
    }

    function renderSelector() {
      var html = "";
      if (currentMode === "well") {
        html += '<div class="section-label">Seleccionar Pozo</div>';
        html += '<div style="display: flex; gap: 30px; flex-wrap: wrap;">';
        
        // Barrera
        html += '<div><div style="font-size:11px; color:#1a3a5f; margin-bottom:8px; font-weight:600;">Pozos Barrera (9)</div><div class="btn-group">';
        Object.keys(DATA.wells).forEach(function(id) {
          if (DATA.wells[id].type === "Barrera") {
            var trend = calcTrend(DATA.wells[id].CT);
            var active = currentWell === id ? " active" : "";
            html += '<button class="btn' + active + '" onclick="selectWell(\'' + id + '\')">';
            html += '<div class="btn-label">' + id.replace("aPIMW", "") + '</div>';
            html += '<div class="btn-sub">CT: ' + trend.label + '</div></button>';
          }
        });
        html += '</div></div>';
        
        // Convencional
        html += '<div><div style="font-size:11px; color:#e67e22; margin-bottom:8px; font-weight:600;">Convencionales (9)</div><div class="btn-group">';
        Object.keys(DATA.wells).forEach(function(id) {
          if (DATA.wells[id].type === "Convencional") {
            var active = currentWell === id ? " active-orange" : "";
            html += '<button class="btn' + active + '" onclick="selectWell(\'' + id + '\')">' + id + '</button>';
          }
        });
        html += '</div></div>';
        html += '</div>';
      } else {
        html += '<div class="section-label">Seleccionar Compuesto</div>';
        html += '<div class="btn-group">';
        DATA.compounds.forEach(function(c) {
          var stats = getCompoundStats(c.id);
          var active = currentCompound === c.id ? " active" : "";
          html += '<button class="btn' + active + '" style="' + (currentCompound === c.id ? 'background:' + c.color + ';border-color:' + c.color : '') + '" onclick="selectCompound(\'' + c.id + '\')">';
          html += '<div class="btn-label">' + c.id + '</div>';
          html += '<div class="btn-sub">NG: ' + c.ng + ' µg/L</div>';
          html += '<div class="btn-sub">↓' + stats.down + ' ↑' + stats.up + ' =' + stats.stable + '</div></button>';
        });
        html += '</div>';
      }
      document.getElementById("selector-card").innerHTML = html;
    }

    function getCompoundStats(compId) {
      var down = 0, up = 0, stable = 0, na = 0;
      Object.keys(DATA.wells).forEach(function(wid) {
        if (DATA.wells[wid].type === "Barrera") {
          var trend = calcTrend(DATA.wells[wid][compId]);
          if (trend.dir === "down" || trend.dir === "detnd") down++;
          else if (trend.dir === "up") up++;
          else if (trend.dir === "stable") stable++;
          else na++;
        }
      });
      return { down: down, up: up, stable: stable, na: na };
    }

    function renderChart() {
      var titleEl = document.getElementById("chart-title");
      var ctx = document.getElementById("mainChart").getContext("2d");
      
      if (chart) chart.destroy();
      
      if (currentMode === "well") {
        var well = DATA.wells[currentWell];
        titleEl.innerHTML = '<h2>' + currentWell + '</h2><span class="well-tag ' + (well.type === "Barrera" ? "barrera" : "conv") + '">' + well.type + '</span>';
        
        var datasets = [];
        DATA.compounds.slice(0, 4).forEach(function(c) {
          datasets.push({
            label: c.id,
            data: well[c.id],
            borderColor: c.color,
            backgroundColor: c.color + "33",
            borderWidth: 3,
            pointRadius: 6,
            pointBackgroundColor: "#fff",
            pointBorderWidth: 2,
            tension: 0.1,
            spanGaps: false
          });
        });
        
        chart = new Chart(ctx, {
          type: "line",
          data: { labels: DATA.eventLabels, datasets: datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: "bottom" } },
            scales: { y: { beginAtZero: true, title: { display: true, text: "µg/L" } } }
          }
        });
      } else {
        var comp = DATA.compounds.find(function(c) { return c.id === currentCompound; });
        titleEl.innerHTML = '<h2>' + comp.name + '</h2><div style="font-size:13px;color:#666;margin-top:5px;">Nivel Guía: ' + comp.ng + ' µg/L • Rol: ' + comp.role + '</div>';
        
        var labels = [];
        var values = [];
        var colors = [];
        Object.keys(DATA.wells).forEach(function(wid) {
          if (DATA.wells[wid].type === "Barrera") {
            var trend = calcTrend(DATA.wells[wid][currentCompound]);
            labels.push(wid.replace("aPIMW", ""));
            values.push(trend.pct);
            colors.push((trend.dir === "down" || trend.dir === "detnd") ? "#28a745" : trend.dir === "up" ? "#dc3545" : "#ffc107");
          }
        });
        
        chart = new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [{
              label: "% Cambio LB→T2",
              data: values,
              backgroundColor: colors,
              borderRadius: 6
            }]
          },
          options: {
            indexAxis: "y",
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { title: { display: true, text: "% Cambio" } } }
          }
        });
      }
    }

    function renderSidePanel() {
      var html = "";
      
      if (currentMode === "well") {
        var well = DATA.wells[currentWell];
        
        // Table
        html += '<div class="card"><h3>Concentraciones</h3><table>';
        html += '<tr><th>Comp.</th><th class="right">LB</th><th class="right">T1</th><th class="right">T2</th><th class="center">Cambio</th></tr>';
        DATA.compounds.forEach(function(c) {
          var vals = well[c.id];
          var trend = calcTrend(vals);
          var trendClass = "trend-" + (trend.dir === "detnd" ? "down" : trend.dir);
          html += '<tr>';
          html += '<td><span style="color:' + c.color + '">●</span> ' + c.id + '</td>';
          html += '<td class="right">' + formatVal(vals[0]) + '</td>';
          html += '<td class="right">' + formatVal(vals[1]) + '</td>';
          html += '<td class="right">' + formatVal(vals[2]) + '</td>';
          html += '<td class="center"><span class="trend-badge ' + trendClass + '">' + trend.label + '</span></td>';
          html += '</tr>';
        });
        html += '</table></div>';
        
        // Geochemistry - ACTUALIZADO según PO v3.1
        html += '<div class="card"><h3>Validación Geoquímica (PO v3.1)</h3>';
        
        // ORP con clasificación de 5 niveles
        html += '<div class="geochem-box"><div class="geochem-header"><span class="geochem-label">ORP (mV)</span><span class="geochem-criteria">Umbral operativo: < -100 mV</span></div>';
        html += '<div class="geochem-values">';
        DATA.events.forEach(function(e, i) {
          var v = well.ORP[i];
          var clasif = clasificarORP(v);
          html += '<div><div class="geochem-event">' + e + '</div>';
          html += '<div class="geochem-value ' + clasif.css + '">' + formatVal(v) + '</div>';
          html += '<div class="geochem-class ' + clasif.css + '">' + clasif.label + '</div></div>';
        });
        html += '</div></div>';
        
        // pH
        html += '<div class="geochem-box"><div class="geochem-header"><span class="geochem-label">pH</span><span class="geochem-criteria">Esperable: neutro a lev. alcalino</span></div>';
        html += '<div class="geochem-values">';
        DATA.events.forEach(function(e, i) {
          var v = well.pH[i];
          html += '<div><div class="geochem-event">' + e + '</div><div class="geochem-value">' + (v !== null ? v.toFixed(2) : "ND") + '</div></div>';
        });
        html += '</div></div>';
        
        // Leyenda ORP
        html += '<div class="orp-legend"><strong>Clasificación ORP (PO v3.1):</strong>';
        html += '<div class="orp-legend-item"><div class="orp-legend-color" style="background:#155724"></div>&lt; -200 mV: Fuert. Reductor (óptimo)</div>';
        html += '<div class="orp-legend-item"><div class="orp-legend-color" style="background:#28a745"></div>-200 a -100 mV: Reductor</div>';
        html += '<div class="orp-legend-item"><div class="orp-legend-color" style="background:#5cb85c"></div>-100 a 0 mV: Lev. Reductor</div>';
        html += '<div class="orp-legend-item"><div class="orp-legend-color" style="background:#f0ad4e"></div>0 a +100 mV: Transición</div>';
        html += '<div class="orp-legend-item"><div class="orp-legend-color" style="background:#dc3545"></div>&gt; +100 mV: Oxidante</div>';
        html += '</div>';
        
        // Mensaje contextual según el pozo
        var orpT1 = well.ORP[1];
        var orpT2 = well.ORP[2];
        if (orpT2 !== null && orpT2 < 0) {
          html += '<div class="success-box">✓ Este pozo mantiene condiciones reductoras (ORP negativo), favorables para la degradación del ZVI.</div>';
        } else if (orpT1 !== null && orpT1 < 0 && orpT2 !== null && orpT2 > 0) {
          html += '<div class="warning-box">⚠️ El ORP bajó en T1 pero rebotó en T2. Monitorear la capacidad reductora del ZVI en próximos trimestres.</div>';
        } else if (orpT2 !== null && orpT2 > 100) {
          html += '<div class="warning-box">⚠️ Condiciones oxidantes. El ZVI puede tener capacidad reductora limitada en esta zona.</div>';
        }
        
        html += '</div>';
        
      } else {
        // Compound summary
        var stats = getCompoundStats(currentCompound);
        html += '<div class="card"><h3>Resumen Pozos Barrera</h3>';
        html += '<div class="summary-item summary-down"><span class="summary-label">↓ Mejorando (incl. Det→ND)</span><span class="summary-value">' + stats.down + '</span></div>';
        html += '<div class="summary-item summary-stable"><span class="summary-label">= Estable (±20%)</span><span class="summary-value">' + stats.stable + '</span></div>';
        html += '<div class="summary-item summary-up"><span class="summary-label">↑ Empeorando (>20% aum.)</span><span class="summary-value">' + stats.up + '</span></div>';
        html += '<div class="summary-item summary-na"><span class="summary-label">Sin datos / ND→ND</span><span class="summary-value">' + stats.na + '</span></div>';
        html += '</div>';
        
        // Info
        html += '<div class="info-box"><h4>ℹ️ Información (PO v3.1)</h4><ul>';
        html += '<li><strong>n = 3</strong> eventos de muestreo</li>';
        html += '<li>Test Spearman: requiere n ≥ 4</li>';
        html += '<li>NG: Decreto 831/93 Tabla 1</li>';
        html += '<li><strong>Det→ND</strong>: Detectado pasó a No Detectado</li>';
        html += '<li>ND tratado como 0 para masa molar</li>';
        html += '</ul></div>';
      }
      
      document.getElementById("side-panel").innerHTML = html;
    }

    // Init
    renderSelector();
    renderChart();
    renderSidePanel();
  </script>
</body>
</html>
